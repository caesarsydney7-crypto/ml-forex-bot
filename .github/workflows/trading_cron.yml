name: Automated ML Trading Engine

on:
  schedule:
    # Runs automatically every 30 minutes, Monday through Friday
    - cron: '*/30 * * * 1-5'
  # Allows you to click a button to run the bot manually whenever you want
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Machine Learning Bot Pipeline
      run: python bot_engine.py
