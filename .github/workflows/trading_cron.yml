name: Automated ML Trading Engine

on:
  schedule:
    - cron: '*/30 * * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the automated runner to save files back to your GitHub page

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Machine Learning Bot Pipeline
      run: python bot_engine.py

    - name: Push Generated Graphic Dashboard to Repository Files
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add trading_dashboard.png
        git commit -m "System Update: Re-rendered ML Graphic Interface Dashboard [Skip CI]" || exit 0
        git push
